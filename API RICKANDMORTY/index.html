<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty - Personajes</title>
    <link rel="stylesheet" href="styles.css">
   
</head>
<body>

    <header>
        <h1>RICK AND MORTY</h1>
        <p>Directorio del multiverso</p>
    </header>

    <div class="controls">
        <!-- Búsqueda por nombre -->
        <div class="search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Buscar personaje por nombre..." />
        </div>

        <!-- Filtros de especie (se generan con JS) -->
        <div class="filters" id="filters">
            <button class="filter-btn active" data-species="all">Todos</button>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">Cargando personajes...</div>

    <div class="grid" id="grid">
        <div class="loading">
            <div class="spinner"></div>
            Conectando con la API del multiverso...
        </div>
    </div>

    <div class="pagination" id="pagination"></div>

    <script>
        // =============================================
        //  VARIABLES GLOBALES
        // =============================================
        let todosLosPersonajes = [];  // Todos los personajes descargados de la API
        let personajesFiltrados = []; // Resultado de aplicar búsqueda + filtro de especie
        let especieActiva = 'all';    // Filtro de especie seleccionado
        let textoBusqueda = '';       // Texto del input de búsqueda
        let paginaActual = 1;
        const POR_PAGINA = 20;        // Cuántos personajes mostrar por página

        // =============================================
        //  1. OBTENER TODOS LOS PERSONAJES DE LA API
        //     La API entrega 20 personajes por página,
        //     así que hacemos múltiples fetch hasta
        //     que no haya más páginas (next === null).
        // =============================================
        async function obtenerTodos() {
            let resultados = [];
            let url = 'https://rickandmortyapi.com/api/character';

            while (url) {
                const respuesta = await fetch(url);
                const datos = await respuesta.json();
                resultados = resultados.concat(datos.results);
                url = datos.info.next; // null cuando no hay más páginas
            }

            return resultados;
        }

        // =============================================
        //  2. CONSTRUIR BOTONES DE FILTRO POR ESPECIE
        //     Se extraen las especies únicas del array
        //     y se crea un botón por cada una.
        // =============================================
        function construirFiltros() {
            const especies = [...new Set(todosLosPersonajes.map(p => p.species))].sort();
            const contenedor = document.getElementById('filters');

            // Botón "Todos" siempre primero
            contenedor.innerHTML = '<button class="filter-btn active" data-species="all">Todos</button>';

            especies.forEach(especie => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.species = especie;
                btn.textContent = especie || 'Desconocido';
                contenedor.appendChild(btn);
            });

            // Evento click en el contenedor (delegación de eventos)
            contenedor.addEventListener('click', function(e) {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;

                // Quitar "active" de todos y ponerlo en el clickeado
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                especieActiva = btn.dataset.species;
                paginaActual = 1;
                aplicarFiltros();
            });
        }

        // =============================================
        //  3. APLICAR FILTROS
        //     Filtra el array global con los criterios
        //     de especie y texto de búsqueda.
        // =============================================
        function aplicarFiltros() {
            personajesFiltrados = todosLosPersonajes.filter(personaje => {
                const coincideEspecie = especieActiva === 'all' || personaje.species === especieActiva;
                const coincideNombre  = personaje.name.toLowerCase().includes(textoBusqueda);
                return coincideEspecie && coincideNombre;
            });

            renderizarGrid();
            renderizarPaginacion();

            // Actualizar barra de estado
            let info = `${personajesFiltrados.length} personaje${personajesFiltrados.length !== 1 ? 's' : ''} encontrado${personajesFiltrados.length !== 1 ? 's' : ''}`;
            if (especieActiva !== 'all') info += ` · Especie: ${especieActiva}`;
            if (textoBusqueda) info += ` · Búsqueda: "${textoBusqueda}"`;
            document.getElementById('statsBar').textContent = info;
        }

        // =============================================
        //  4. RENDERIZAR TARJETAS EN EL GRID
        //     Solo muestra los personajes de la
        //     página actual (paginación).
        // =============================================
        function renderizarGrid() {
            const grid = document.getElementById('grid');
            const inicio = (paginaActual - 1) * POR_PAGINA;
            const personajesPagina = personajesFiltrados.slice(inicio, inicio + POR_PAGINA);

            if (personajesPagina.length === 0) {
                grid.innerHTML = '<div class="empty-state">No se encontraron personajes con ese criterio.</div>';
                return;
            }

            grid.innerHTML = '';

            personajesPagina.forEach(personaje => {
                // Elegir clase CSS del badge según especie
                const claseEspecie = obtenerClaseEspecie(personaje.species);

                const tarjeta = document.createElement('article');
                tarjeta.className = 'card';
                tarjeta.innerHTML = `
                    <img src="${personaje.image}" alt="${personaje.name}" loading="lazy">
                    <div class="card-info">
                        <h2 title="${personaje.name}">${personaje.name}</h2>
                        <span class="badge ${claseEspecie}">${personaje.species}</span>
                        <div class="status">
                            <span class="dot dot-${personaje.status}"></span>
                            ${personaje.status}
                        </div>
                    </div>
                `;

                grid.appendChild(tarjeta);
            });
        }

        // =============================================
        //  5. RENDERIZAR PAGINACIÓN
        // =============================================
        function renderizarPaginacion() {
            const totalPaginas = Math.ceil(personajesFiltrados.length / POR_PAGINA);
            const contenedor = document.getElementById('pagination');

            if (totalPaginas <= 1) {
                contenedor.innerHTML = '';
                return;
            }

            contenedor.innerHTML = `
                <button class="page-btn" id="btnAnterior" ${paginaActual === 1 ? 'disabled' : ''}>← Anterior</button>
                <span class="page-info">Página ${paginaActual} de ${totalPaginas}</span>
                <button class="page-btn" id="btnSiguiente" ${paginaActual === totalPaginas ? 'disabled' : ''}>Siguiente →</button>
            `;

            document.getElementById('btnAnterior').addEventListener('click', () => {
                paginaActual--;
                renderizarGrid();
                renderizarPaginacion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            document.getElementById('btnSiguiente').addEventListener('click', () => {
                paginaActual++;
                renderizarGrid();
                renderizarPaginacion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // =============================================
        //  6. HELPER: clase CSS para el badge de especie
        // =============================================
        function obtenerClaseEspecie(especie) {
            const mapa = {
                'Human':                 'badge-Human',
                'Alien':                 'badge-Alien',
                'Humanoid':              'badge-Humanoid',
                'Robot':                 'badge-Robot',
                'Animal':                'badge-Animal',
                'Disease':               'badge-Disease',
                'Mythological Creature': 'badge-Mythological',
                'Poopybutthole':         'badge-Poopybutthole',
                'unknown':               'badge-unknown',
            };
            return mapa[especie] || 'badge-unknown';
        }

        // =============================================
        //  7. EVENTO: búsqueda en tiempo real
        // =============================================
        document.getElementById('searchInput').addEventListener('input', function(e) {
            textoBusqueda = e.target.value.toLowerCase().trim();
            paginaActual = 1;
            aplicarFiltros();
        });

        // =============================================
        //  8. INICIO: cargar personajes
        // =============================================
        obtenerTodos()
            .then(personajes => {
                todosLosPersonajes = personajes;
                construirFiltros();
                aplicarFiltros();
            })
            .catch(error => {
                document.getElementById('grid').innerHTML =
                    '<div class="empty-state">Error al conectar con la API. Verifica tu conexión.</div>';
                document.getElementById('statsBar').textContent = 'Error de conexión.';
                console.error(error);
            });
    </script>

</body>
</html>
